<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Penduduk</title>

<style>
body {
  font-family: Arial;
  background: #222;
  color: white;
}

.container {
  max-width: 500px;
  margin: 50px auto;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}
button {
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<div class="container">
<h2>TES FORM</h2>

<form id="formPenduduk">

<input name="nama" placeholder="Nama" required>

<select name="jenis_kelamin" required>
  <option value="">Pilih</option>
  <option value="L">L</option>
  <option value="P">P</option>
</select>

<button type="submit">Simpan</button>

</form>

</div>

<script>
document.getElementById("formPenduduk").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbwkFF1bc9csPFdhP69oHMXbafBLOJri_PJxZh4wcHbCyByGxS99UOR6ZQR5BTqzzSiW5g/exec", {
    method: "POST",
    body: formData
  })
  .then(() => {
    alert("Sukses");
    this.reset();
  })
  .catch(() => {
    alert("Gagal");
  });
});
</script>

</body>
</html>
