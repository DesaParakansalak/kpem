<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("formPenduduk");
  const btn = document.getElementById("btn");

  if (!form) {
    alert("❌ Form tidak ditemukan!");
    return;
  }

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    btn.disabled = true;
    btn.innerText = "Menyimpan...";

    fetch("https://script.google.com/macros/s/AKfycbwkFF1bc9csPFdhP69oHMXbafBLOJri_PJxZh4wcHbCyByGxS99UOR6ZQR5BTqzzSiW5g/exec", {
      method: "POST",
      body: formData,
      mode: "no-cors" // 🔥 ini kunci
    })
    .then(() => {
      alert("✅ Data berhasil dikirim");
      form.reset();
    })
    .catch(err => {
      alert("❌ Gagal koneksi");
      console.error(err);
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerText = "Simpan";
    });

  });

});
</script>
