<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Penduduk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: url('img.jpg') center/cover no-repeat fixed;
  color: white;
}

.container {
  max-width: 600px;
  margin: 50px auto;
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 15px;
}

h2 { text-align:center; margin-bottom:20px; }

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: orange;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<div class="container">
<h2>Input Data Penduduk</h2>

<input id="nama" placeholder="Nama">

<select id="jk">
  <option value="">Jenis Kelamin</option>
  <option value="L">Laki-laki</option>
  <option value="P">Perempuan</option>
</select>

<input id="tempat_lahir" placeholder="Tempat Lahir">
<input type="date" id="tgl_lahir">

<input id="kewarganegaraan" placeholder="Kewarganegaraan">

<select id="jenis">
  <option value="">Status Peristiwa</option>
  <option value="DATANG">DATANG</option>
  <option value="PINDAH">PINDAH</option>
  <option value="MATI">MATI</option>
  <option value="LAHIR">LAHIR</option>
</select>

<input id="dusun" placeholder="Dusun">
<input id="datang_dari" placeholder="Datang dari">
<input type="date" id="tgl_datang">

<input id="pindah_ke" placeholder="Pindah ke">
<input type="date" id="tgl_pindah">

<input id="meninggal_di" placeholder="Meninggal di">
<input type="date" id="tgl_meninggal">

<select id="status_mdk">
  <option value="">Status MDK</option>
  <option value="MATI">MATI</option>
  <option value="LAHIR">LAHIR</option>
</select>

<input id="alamat" placeholder="Alamat">
<input id="ayah" placeholder="Nama Ayah">
<input id="ibu" placeholder="Nama Ibu">

<select id="status">
  <option value="">Status</option>
  <option value="kawin">Kawin</option>
  <option value="belum kawin">Belum Kawin</option>
  <option value="cerai hidup">Cerai Hidup</option>
  <option value="Cerai Mati">Cerai Mati</option>
</select>

<button id="btn" onclick="kirimData()">Simpan</button>

</div>

<script>
function kirimData() {

  const btn = document.getElementById("btn");

  const data = {
    nama: document.getElementById("nama").value,
    jenis_kelamin: document.getElementById("jk").value,
    tempat_lahir: document.getElementById("tempat_lahir").value,
    tgl_lahir: document.getElementById("tgl_lahir").value,
    kewarganegaraan: document.getElementById("kewarganegaraan").value,
    jenis: document.getElementById("jenis").value,
    dusun: document.getElementById("dusun").value,
    datang_dari: document.getElementById("datang_dari").value,
    tgl_datang: document.getElementById("tgl_datang").value,
    pindah_ke: document.getElementById("pindah_ke").value,
    tgl_pindah: document.getElementById("tgl_pindah").value,
    meninggal_di: document.getElementById("meninggal_di").value,
    tgl_meninggal: document.getElementById("tgl_meninggal").value,
    status_mdk: document.getElementById("status_mdk").value,
    alamat: document.getElementById("alamat").value,
    ayah: document.getElementById("ayah").value,
    ibu: document.getElementById("ibu").value,
    status: document.getElementById("status").value
  };

  // VALIDASI MINIMAL
  if (!data.nama || !data.jenis_kelamin) {
    alert("❗ Nama dan Jenis Kelamin wajib diisi");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Menyimpan...";

  fetch("https://script.google.com/macros/s/AKfycbwkFF1bc9csPFdhP69oHMXbafBLOJri_PJxZh4wcHbCyByGxS99UOR6ZQR5BTqzzSiW5g/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      alert("✅ Data berhasil masuk");
      document.querySelectorAll("input, select").forEach(el => el.value = "");
    } else {
      alert("❌ Error: " + res.message);
    }
  })
  .catch(err => {
    alert("❌ Gagal koneksi");
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerText = "Simpan";
  });

}
</script>

</body>
</html>
