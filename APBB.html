<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: url('img.jpg') center/cover no-repeat fixed;
  color: white;
}

/* OVERLAY */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* JAM */
.top-time {
  position: fixed;
  top: 10px;
  right: 20px;
  font-size: 13px;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
}

.logo img {
  width: 55px;
}

/* HERO */
.hero {
  text-align: center;
  padding-top: 100px;
  padding-bottom: 20px;
}

.hero h1 {
  font-size: 26px;
  margin-bottom: 10px;
  background: linear-gradient(to right, #fff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.desc {
  max-width: 600px;
  margin: 10px auto 30px;
  font-size: 13px;
  opacity: 0.8;
}

/* GRID MENU */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
  max-width: 600px;
  margin: auto;
}

/* BUTTON */
.menu a {
  height: 100px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-decoration: none;
  color: white;
  font-size: 12px;

  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

/* ICON */
.menu i {
  font-size: 22px;
  margin-bottom: 6px;
}

/* HOVER */
.menu a:hover {
  background: linear-gradient(135deg, #ffd700, orange);
  color: black;
  transform: translateY(-4px);
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  font-size: 12px;
  opacity: 0.7;
}

.footer img {
  width: 40px;
}

</style>
</head>

<!-- SCRIPT JAM -->
<script>
function updateDateTime() {
    const now = new Date();

    const hari = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const bulan = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    const tgl = hari[now.getDay()] + ", " +
                now.getDate() + " " +
                bulan[now.getMonth()] + " " +
                now.getFullYear();

    const jam = String(now.getHours()).padStart(2, '0');
    const menit = String(now.getMinutes()).padStart(2, '0');
    const detik = String(now.getSeconds()).padStart(2, '0');

    document.getElementById("tanggal").innerText = tgl;
    document.getElementById("jam").innerText = `${jam}:${menit}:${detik} WIB`;
}

setInterval(updateDateTime, 1000);
updateDateTime();
</script>
