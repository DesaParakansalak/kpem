<style>

/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: url('img.jpg') center/cover no-repeat fixed;
  color: white;
}

/* OVERLAY */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
}

.logo img {
  width: 55px;
}

/* HERO */
.hero {
  text-align: center;
  padding-top: 100px;
  padding-bottom: 40px;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
  background: linear-gradient(to right, #fff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* TITLE */
.title {
  margin: 30px 0 15px;
  text-align: center;
  font-weight: 500;
  opacity: 0.9;
}

/* GROUP */
.group {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

/* BUTTON MODERN */
.btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 110px;
  height: 90px;

  text-decoration: none;
  color: white;
  font-size: 12px;

  border-radius: 16px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

/* ICON */
.btn i {
  font-size: 20px;
  margin-bottom: 5px;
}

/* HOVER */
.btn:hover {
  background: linear-gradient(135deg, #ffd700, orange);
  color: black;
  transform: translateY(-4px);
  box-shadow: 0 8px 25px rgba(255,165,0,0.5);
}

/* HOME BUTTON */
.bottom-nav {
  text-align: center;
  margin: 40px 0;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  padding: 12px 24px;
  border-radius: 30px;

  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);

  color: white;
  text-decoration: none;
  font-size: 14px;

  border: 1px solid rgba(255,255,255,0.3);
  transition: 0.3s;
}

.home-btn:hover {
  background: orange;
  color: black;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  opacity: 0.7;
}

.footer img {
  width: 40px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .btn {
    width: 90px;
    height: 80px;
  }
}

</style>
</head>
