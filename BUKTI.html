<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: url('img.jpg') center/cover no-repeat fixed;
  color: white;
}

/* OVERLAY */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
}

.logo img {
  width: 55px;
}

/* HERO */
.hero {
  text-align: center;
  padding-top: 100px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 30px;
  background: linear-gradient(to right, #fff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* GRID UTAMA */
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 15px;
}

/* BUTTON */
.btn {
  height: 95px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-decoration: none;
  color: white;
  font-size: 11px;

  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

/* ICON */
.btn i {
  font-size: 20px;
  margin-bottom: 6px;
}

/* LABEL KECIL */
.btn small {
  font-size: 9px;
  opacity: 0.7;
}

/* HOVER */
.btn:hover {
  background: linear-gradient(135deg, #ffd700, orange);
  color: black;
  transform: translateY(-4px);
}

/* HOME */
.bottom-nav {
  text-align: center;
  margin: 40px 0;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 30px;
  background: rgba(0,0,0,0.5);
  color: white;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.3);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  opacity: 0.7;
}

.footer img {
  width: 40px;
}

</style>
</head>
